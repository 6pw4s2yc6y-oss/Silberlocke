name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: JS-Syntax prüfen
        run: npm run check:syntax
      - name: Daten validieren
        run: npm run validate:data
      - name: Unit-Tests
        run: npm test
