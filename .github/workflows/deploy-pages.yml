name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig; laufende Deploys nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Pages konfigurieren (aktiviert Pages, falls noch nicht aktiv)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Artefakt hochladen (statische Seite = Repo-Root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deployen
        id: deployment
        uses: actions/deploy-pages@v4
