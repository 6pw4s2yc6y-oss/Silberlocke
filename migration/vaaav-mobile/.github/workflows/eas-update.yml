# ── Expo EAS Update Pipeline ────────────────────────────────────────────────
# Master-Handoff, Workflow-Regel: Entwicklung ohne lokalen PC. Jeder Push auf
# main veröffentlicht automatisch ein EAS Update; getestet wird via Expo Go
# (QR-Code im Expo-Dashboard).
#
# EINMALIGE EINRICHTUNG (siehe README, Abschnitt "EAS einrichten"):
#   1. Repo-Secret  EXPO_TOKEN        (Access Token von expo.dev)
#   2. Repo-Variable EXPO_PROJECT_ID  (Projekt-ID von expo.dev)

name: EAS Update

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Konfiguration prüfen
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::Secret EXPO_TOKEN fehlt. expo.dev → Account Settings → Access Tokens anlegen und als Repo-Secret speichern."
            exit 1
          fi
          if [ -z "${{ vars.EXPO_PROJECT_ID }}" ]; then
            echo "::error::Variable EXPO_PROJECT_ID fehlt. expo.dev → Projekt anlegen → ID als Repo-Variable speichern."
            exit 1
          fi

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: EAS CLI einrichten
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Expo-Projekt-ID injizieren
        run: node scripts/inject-eas-project.mjs
        env:
          EXPO_PROJECT_ID: ${{ vars.EXPO_PROJECT_ID }}

      - name: EAS Update veröffentlichen
        run: eas update --auto --non-interactive
